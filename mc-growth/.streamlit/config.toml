# Tema do painel — claro (fundo branco). ADR/UX 2026-07-03.
[theme]
base = "light"
primaryColor = "#1f7a3d"        # verde (destaque, botões, seleção)
backgroundColor = "#ffffff"     # fundo da página
secondaryBackgroundColor = "#f2f4f7"  # fundo de cartões/tabela
textColor = "#1a1a1a"           # texto principal (alto contraste no branco)
